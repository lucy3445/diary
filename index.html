<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
/* ───────────────────────────────────────────────
   하루 — AI 코칭 일기앱  ·  Design tokens & base
   ─────────────────────────────────────────────── */
:root{
  /* surfaces */
  --bg:        #F1EBDF;
  --paper:     #FBF7EF;
  --paper-2:   #F6F0E4;
  --ink:       #33302B;
  --ink-2:     #6E685D;
  --ink-3:     #A39B8C;
  --line:      rgba(51,48,43,0.09);
  --line-2:    rgba(51,48,43,0.05);

  /* brand */
  --terra:     #C5613A;
  --terra-d:   #A84E2C;
  --terra-soft:#F3DDD0;
  --sage:      #7C8B6B;
  --sage-d:    #5F6E50;
  --sage-soft: #E1E6D6;
  --gold:      #C79A41;
  --gold-soft: #F0E3C4;

  /* emotion palette */
  --emo-joy:   #DDA53C;
  --emo-calm:  #8AA086;
  --emo-focus: #C5613A;
  --emo-tired: #AE9F89;
  --emo-anx:   #CA8A5E;
  --emo-low:   #7E90A6;

  --r-lg: 28px;
  --r-md: 20px;
  --r-sm: 14px;
  --shadow-card: 0 1px 2px rgba(51,48,43,0.04), 0 8px 24px rgba(51,48,43,0.06);
  --shadow-pop:  0 8px 16px rgba(51,48,43,0.10), 0 24px 48px rgba(51,48,43,0.14);

  --sans: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif;
  --serif: "Noto Serif KR", "Nanum Myeongjo", serif;
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }

.app-root{
  font-family: var(--sans);
  color: var(--ink);
  height:100%;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.screen{
  height:100%;
  overflow-y:auto;
  overflow-x:hidden;
  background: var(--bg);
  -webkit-overflow-scrolling: touch;
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{ display:none; }

.serif{ font-family:var(--serif); }

.muted{ color:var(--ink-2); }
.faint{ color:var(--ink-3); }

.card{
  background:var(--paper);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-card);
}

.pill{
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 11px; border-radius:999px;
  font-size:12.5px; font-weight:600; letter-spacing:-0.01em;
}

.tap{ transition: transform .12s ease, opacity .12s ease; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.tap:active{ transform:scale(0.97); opacity:.9; }

@keyframes riseIn{ from{ opacity:.001; transform:translateY(10px);} to{ opacity:1; transform:none;} }
@keyframes fadeIn{ from{ opacity:.001;} to{ opacity:1;} }
@keyframes popIn{ from{ opacity:0; transform:scale(.94);} to{ opacity:1; transform:none;} }
@keyframes sheetUp{ from{ transform:translateY(100%);} to{ transform:translateY(0);} }

.rise{ animation: riseIn .5s cubic-bezier(.2,.7,.2,1) both; }

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:none; font-family:var(--sans); font-weight:700; font-size:16px;
  border-radius:999px; cursor:pointer; padding:15px 22px;
  transition: transform .12s ease, filter .12s ease;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{ transform:scale(.98); }
.btn-primary{ background:var(--terra); color:#fff; box-shadow:0 6px 16px rgba(197,97,58,0.32); }
.btn-primary:active{ filter:brightness(.96); }
.btn-ghost{ background:var(--paper); color:var(--ink); box-shadow:var(--shadow-card); }
.btn-sage{ background:var(--sage); color:#fff; box-shadow:0 6px 16px rgba(124,139,107,0.30); }

.sec-label{
  font-size:12px; font-weight:700; letter-spacing:0.06em;
  text-transform:uppercase; color:var(--ink-3);
}

.wf{ display:flex; align-items:center; gap:3px; }
.wf > i{ width:3px; border-radius:2px; background:currentColor; display:block; }

@keyframes breathe{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.07); }
}
@keyframes ring{
  0%{ transform:scale(.7); opacity:.55; }
  100%{ transform:scale(2.1); opacity:0; }
}
@keyframes blink{ 0%,100%{opacity:.25;} 50%{opacity:1;} }
@keyframes liveBar{ from{ transform:scaleY(.4);} to{ transform:scaleY(1);} }

html, body { height: 100%; }
body {
  margin: 0;
  background: radial-gradient(120% 90% at 50% 0%, #EBE3D3 0%, #E3D9C6 60%, #DACEB8 100%);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px; box-sizing: border-box;
  font-family: "Pretendard Variable", Pretendard, system-ui, sans-serif;
}
#stage { display: flex; align-items: center; justify-content: center; }
.device-screen { position: absolute; inset: 0; }
</style>
</head>

  <script type="text/babel" data-presets="react">
/* ui — shared small components */

const EMO_LIST = ['joy','calm','focus','tired','anx','low'];

function MoodDot({ mood, size = 12 }) {
  const e = window.EMO[mood];
  return <span style={{ width:size, height:size, borderRadius:'50%',
    background:e ? e.color : 'var(--ink-3)', display:'inline-block', flexShrink:0 }} />;
}

function MoodChip({ mood, faded }) {
  const e = window.EMO[mood];
  if (!e) return null;
  return (
    <span className="pill" style={{
      background: faded ? 'var(--paper-2)' : `color-mix(in srgb, ${e.color} 16%, var(--paper))`,
      color: faded ? 'var(--ink-2)' : `color-mix(in srgb, ${e.color} 62%, var(--ink))`,
    }}>
      <MoodDot mood={mood} size={9} />{e.label}
    </span>
  );
}

function MoodArc({ arc }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
      {arc.map((m,i) => (
        <React.Fragment key={i}>
          <MoodChip mood={m} />
          {i < arc.length-1 && (
            <window.IcChevR size={14} style={{ color:'var(--ink-3)' }} />
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

function WaveBars({ n = 22, color = 'currentColor', h = 18, seed = 1 }) {
  const bars = React.useMemo(() => {
    const a = [];
    let s = seed * 9301 + 49297;
    for (let i=0;i<n;i++){ s = (s*9301+49297)%233280; a.push(0.25 + (s/233280)*0.75); }
    return a;
  }, [n, seed]);
  return (
    <span className="wf" style={{ color, height:h }}>
      {bars.map((v,i)=><i key={i} style={{ height: Math.round(v*h) }} />)}
    </span>
  );
}

const INSIGHT_META = {
  learn: { label:'오늘 배운 점', Icon: () => <window.IcSpark size={18}/>, color:'var(--gold)' },
  keep:  { label:'이어갈 점',   Icon: () => <window.IcLeaf  size={18}/>, color:'var(--sage)' },
  fix:   { label:'고칠 점',     Icon: () => <window.IcTool  size={18}/>, color:'var(--terra)' },
};

function InsightCard({ ins, delay = 0 }) {
  const m = INSIGHT_META[ins.type];
  return (
    <div className="card rise" style={{ padding:'16px 17px', display:'flex', gap:13, animationDelay:`${delay}ms` }}>
      <div style={{ width:34, height:34, borderRadius:11, flexShrink:0, display:'grid', placeItems:'center',
        background:`color-mix(in srgb, ${m.color} 15%, var(--paper))`, color:m.color }}>
        <m.Icon />
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:12.5, fontWeight:700, color:m.color, marginBottom:4, letterSpacing:'-0.01em' }}>{m.label}</div>
        <div style={{ fontSize:14.5, lineHeight:1.55, color:'var(--ink)' }}>{ins.text}</div>
      </div>
    </div>
  );
}

function Tag({ children }) {
  return <span className="pill" style={{ background:'var(--paper-2)', color:'var(--ink-2)', fontWeight:600 }}>#{children}</span>;
}

Object.assign(window, { EMO_LIST, MoodDot, MoodChip, MoodArc, WaveBars, InsightCard, INSIGHT_META, Tag });
  </script>

                {t.from && <span className="pill" style={{ background:'var(--gold-soft)', color:'#9A7420', fontSize:10.5, padding:'3px 8px' }}>대화</span>}
              </div>
            ))}

      <div style={{ padding:'22px 18px 0' }}>

          {window.RECENT.map((r,i)=>(
            <div key={i} className="card tap" style={{ padding:'13px 15px', display:'flex', alignItems:'center', gap:13 }}>
              <div style={{ width:44, flexShrink:0, textAlign:'center' }}>
                <div className="serif" style={{ fontSize:20, fontWeight:600, lineHeight:1 }}>{r.d}</div>

                <div style={{ display:'flex', gap:6, marginTop:5 }}>

function SectionHead({ label, right, onRight }) {

  <script type="text/babel" data-presets="react">
/* screen-convo — voice coaching conversation (core) */
const { useState, useRef, useEffect, useCallback } = React;

function CoachOrb({ size = 30, active }) {
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', flexShrink:0, position:'relative',
      background:'radial-gradient(circle at 32% 30%, #E89A6B 0%, #C5613A 55%, #A84E2C 100%)',
      boxShadow:'0 3px 8px rgba(168,78,44,0.34), inset 0 1px 2px rgba(255,255,255,0.4)',
      animation: active ? 'breathe 2.6s ease-in-out infinite' : 'none' }}>
      <div style={{ position:'absolute', top:'24%', left:'26%', width:'22%', height:'22%',
        borderRadius:'50%', background:'rgba(255,255,255,0.55)' }} />
    </div>
  );
}

function LiveWave({ color = '#fff' }) {
  const bars = [0.4,0.7,1,0.55,0.85,0.45,0.95,0.6,0.75,0.4,0.9,0.5,0.8];
  return (
    <span className="wf" style={{ color, height:22 }}>
      {bars.map((v,i)=>(
        <i key={i} style={{ height:22*v, animation:`liveBar 0.7s ease-in-out ${i*0.06}s infinite alternate` }} />
      ))}
    </span>
  );
}

function ConvoScreen({ onClose, onFinish }) {
  const C = window.CONVO;
  const [msgs, setMsgs] = useState([{ ...C[0], id:0 }]);
  const [nextIdx, setNextIdx] = useState(1);
  const [mode, setMode] = useState('idle');
  const [partial, setPartial] = useState('');
  const [kb, setKb] = useState(false);
  const [draft, setDraft] = useState('');
  const [done, setDone] = useState(false);
  const scrollRef = useRef(null);
  const timers = useRef([]);

  const scrollDown = useCallback(() => {
    const el = scrollRef.current;
    if (el) requestAnimationFrame(() => { el.scrollTop = el.scrollHeight + 400; });
  }, []);
  useEffect(scrollDown, [msgs, partial, mode, done]);
  useEffect(() => () => timers.current.forEach(clearTimeout), []);
  const T = (fn, ms) => { const id = setTimeout(fn, ms); timers.current.push(id); return id; };

  const coachReply = useCallback((idx, userText, viaAI) => {
    setMode('thinking');
    const scripted = C[idx] && C[idx].role === 'coach' ? C[idx] : null;
    const commit = (text, tag) => {
      setMsgs(m => [...m, { role:'coach', text, tag: tag, id: Date.now()+Math.random() }]);
      setMode('idle');
      if (scripted && scripted.last) setDone(true);
      setNextIdx(idx + 1);
    };
    if (viaAI && window.claude && window.claude.complete) {
      const ctx = C.slice(0, idx).concat([{role:'user',text:userText}])
        .map(m => `${m.role==='coach'?'코치':'나'}: ${m.text}`).join('\n');
      window.claude.complete({ messages:[{ role:'user', content:
`너는 따뜻하고 통찰력 있는 일기 코치야. 사용자가 하루를 이야기하면, 감정을 돌보고 인사이트를 끌어내는 "질문 하나"만 짧게(2문장 이내) 한국어 반말 존댓말 섞지 말고 부드러운 존댓말로 해. 설명·요약 금지, 오직 질문.\n\n[대화]\n${ctx}\n\n코치의 다음 질문:` }] })
        .then(r => commit((r||'').trim() || (scripted?scripted.text:'그 마음을 조금 더 들려주실 수 있어요?'), '감정 돌보기'))
        .catch(() => commit(scripted?scripted.text:'그 마음을 조금 더 들려주실 수 있어요?', scripted?scripted.tag:null));
    } else {
      T(() => commit(scripted?scripted.text:'그 마음을 조금 더 들려주실 수 있어요?', scripted?scripted.tag:null), 1100);
    }
  }, []);

  const startListen = () => {
    if (mode !== 'idle' || done) return;
    const line = (C[nextIdx] && C[nextIdx].role==='user') ? C[nextIdx].text : '오늘 있었던 일을 떠올려보고 있어요...';
    const words = line.split(' ');
    setMode('listening'); setPartial('');
    let i = 0;
    const step = () => {
      i++;
      setPartial(words.slice(0,i).join(' '));
      if (i < words.length) T(step, 70 + Math.random()*70);
      else T(() => commitSpeech(line), 500);
    };
    T(step, 350);
  };
  const stopListen = () => {
    if (mode !== 'listening') return;
    const line = (C[nextIdx] && C[nextIdx].role==='user') ? C[nextIdx].text : partial || '...';
    commitSpeech(line);
  };
  const commitSpeech = (line) => {
    timers.current.forEach(clearTimeout); timers.current = [];
    setPartial('');
    setMsgs(m => [...m, { role:'user', voice:true, text:line, id:Date.now() }]);
    const ci = nextIdx + 1;
    setNextIdx(ci);
    T(() => coachReply(ci, line, false), 450);
  };

  const sendDraft = () => {
    const text = draft.trim();
    if (!text || mode==='thinking') return;
    setDraft('');
    const scriptedUserHere = (C[nextIdx] && C[nextIdx].role==='user');
    setMsgs(m => [...m, { role:'user', voice:false, text, id:Date.now() }]);
    const ci = scriptedUserHere ? nextIdx+1 : nextIdx;
    setNextIdx(ci);
    T(() => coachReply(ci, text, true), 300);
  };

  const quick = window.QUICK[nextIdx];

  return (
    <div style={{ position:'absolute', inset:0, zIndex:80, background:'var(--bg)',
      display:'flex', flexDirection:'column' }}>
      <div style={{ paddingTop:58, paddingBottom:12, paddingInline:18, display:'flex', alignItems:'center',
        justifyContent:'space-between', borderBottom:'1px solid var(--line-2)', background:'var(--bg)' }}>
        <button className="tap" onClick={onClose} style={{ border:'none', background:'var(--paper)', width:38, height:38,
          borderRadius:'50%', display:'grid', placeItems:'center', boxShadow:'var(--shadow-card)', color:'var(--ink-2)', cursor:'pointer' }}>
          <window.IcClose size={18}/>
        </button>
        <div style={{ textAlign:'center' }}>
          <div style={{ fontSize:14.5, fontWeight:700 }}>코치와 대화</div>
          <div className="faint" style={{ fontSize:11.5, display:'flex', alignItems:'center', gap:5, justifyContent:'center', marginTop:1 }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--terra)', animation:'blink 1.6s infinite' }} />
            6월 14일 · 기록 중
          </div>
        </div>
        <div style={{ width:38 }} />
      </div>

      <div ref={scrollRef} className="screen" style={{ flex:1, padding:'20px 18px 8px' }}>
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {msgs.map(m => <Bubble key={m.id} m={m} />)}
          {mode==='thinking' && (
            <div style={{ display:'flex', gap:10, alignItems:'flex-end' }}>
              <CoachOrb size={28} active />
              <div className="card" style={{ padding:'13px 16px', display:'flex', gap:5, borderTopLeftRadius:6 }}>
                {[0,1,2].map(i=><span key={i} style={{ width:7, height:7, borderRadius:'50%', background:'var(--ink-3)', animation:`blink 1.1s ${i*0.18}s infinite` }} />)}
              </div>
            </div>
          )}
          {mode==='listening' && (
            <div style={{ display:'flex', justifyContent:'flex-end' }}>
              <div style={{ maxWidth:'82%', background:'var(--terra)', color:'#fff', padding:'14px 16px',
                borderRadius:'20px 20px 6px 20px', boxShadow:'0 6px 16px rgba(197,97,58,0.3)' }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom: partial?9:0 }}>
                  <LiveWave /><span style={{ fontSize:11.5, fontWeight:700, opacity:.85, marginLeft:'auto' }}>듣는 중…</span>
                </div>
                {partial && <div style={{ fontSize:15, lineHeight:1.55 }}>{partial}<span style={{ opacity:.6 }}>｜</span></div>}
              </div>
            </div>
          )}
        </div>
        {done && <FinishCard onFinish={onFinish} />}
        <div style={{ height:12 }} />
      </div>

      {!done && <ConvoDock mode={mode} kb={kb} setKb={setKb} draft={draft} setDraft={setDraft}
        sendDraft={sendDraft} startListen={startListen} stopListen={stopListen} quick={quick}
        onQuick={(t)=>{ setMsgs(m=>[...m,{role:'user',voice:false,text:t,id:Date.now()}]); const sc=(C[nextIdx]&&C[nextIdx].role==='user'); const ci=sc?nextIdx+1:nextIdx; setNextIdx(ci); setTimeout(()=>coachReply(ci,t,false),350); }} />}
    </div>
  );
}

function Bubble({ m }) {
  if (m.role === 'coach') {
    return (
      <div className="rise" style={{ display:'flex', gap:10, alignItems:'flex-end' }}>
        <CoachOrb size={28} />
        <div style={{ maxWidth:'82%' }}>
          {m.tag && <div style={{ display:'inline-flex', alignItems:'center', gap:5, marginBottom:6, marginLeft:2,
            fontSize:11, fontWeight:700, color:'var(--terra)' }}><window.IcSpark size={12}/>{m.tag}</div>}
          <div className="card" style={{ padding:'14px 16px', borderTopLeftRadius:6, fontSize:15, lineHeight:1.62, whiteSpace:'pre-line' }}>{m.text}</div>
        </div>
      </div>
    );
  }
  return (
    <div className="rise" style={{ display:'flex', justifyContent:'flex-end' }}>
      <div style={{ maxWidth:'82%', background:'var(--terra)', color:'#fff', padding:'13px 16px',
        borderRadius:'20px 20px 6px 20px', boxShadow:'0 5px 14px rgba(197,97,58,0.26)' }}>
        {m.voice && (
          <div style={{ display:'flex', alignItems:'center', gap:9, marginBottom:9, opacity:.92 }}>
            <window.IcMic size={14}/><window.WaveBars n={20} h={16} color="rgba(255,255,255,0.85)" seed={String(m.text).length}/>
          </div>
        )}
        <div style={{ fontSize:15, lineHeight:1.6 }}>{m.text}</div>
      </div>
    </div>
  );
}

function ConvoDock({ mode, kb, setKb, draft, setDraft, sendDraft, startListen, stopListen, quick, onQuick }) {
  return (
    <div style={{ background:'var(--bg)', borderTop:'1px solid var(--line-2)', padding:'12px 18px 30px' }}>
      {quick && mode==='idle' && !kb && (
        <div style={{ display:'flex', gap:8, marginBottom:13, flexWrap:'wrap', justifyContent:'center' }}>
          {quick.map(q=>(
            <button key={q} className="tap" onClick={()=>onQuick(q)} style={{ border:'1px solid var(--line)', background:'var(--paper)',
              color:'var(--ink-2)', borderRadius:999, padding:'9px 15px', fontSize:13.5, fontWeight:600, cursor:'pointer', fontFamily:'var(--sans)' }}>{q}</button>
          ))}
        </div>
      )}

      {kb ? (
        <div style={{ display:'flex', alignItems:'flex-end', gap:9 }}>
          <button className="tap" onClick={()=>setKb(false)} style={{ border:'none', background:'var(--paper)', width:46, height:46, borderRadius:'50%',
            display:'grid', placeItems:'center', boxShadow:'var(--shadow-card)', color:'var(--terra)', cursor:'pointer', flexShrink:0 }}>
            <window.IcMic size={20}/>
          </button>
          <div style={{ flex:1, display:'flex', alignItems:'flex-end', background:'var(--paper)', borderRadius:24, boxShadow:'var(--shadow-card)', padding:'4px 4px 4px 16px' }}>
            <textarea value={draft} onChange={e=>setDraft(e.target.value)} rows={1} placeholder="직접 입력해 보세요…"
              onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendDraft(); } }}
              style={{ flex:1, border:'none', outline:'none', resize:'none', background:'none', fontFamily:'var(--sans)',
                fontSize:15, lineHeight:1.5, padding:'9px 0', maxHeight:90, color:'var(--ink)' }} />
            <button className="tap" onClick={sendDraft} disabled={!draft.trim()} style={{ border:'none', width:38, height:38, borderRadius:'50%', flexShrink:0,
              background: draft.trim()?'var(--terra)':'var(--line)', color:'#fff', display:'grid', placeItems:'center', cursor:'pointer', marginBottom:1 }}>
              <window.IcArrowU size={19}/>
            </button>
          </div>
        </div>
      ) : (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:0, position:'relative' }}>
          <button className="tap" onClick={()=>setKb(true)} style={{ position:'absolute', left:0, border:'none', background:'var(--paper)', width:46, height:46, borderRadius:'50%',
            display:'grid', placeItems:'center', boxShadow:'var(--shadow-card)', color:'var(--ink-2)', cursor:'pointer' }}>
            <window.IcKeyb size={20}/>
          </button>
          <MicButton mode={mode} onStart={startListen} onStop={stopListen} />
          <div style={{ position:'absolute', right:0, textAlign:'center', width:46 }}>
            <div className="faint" style={{ fontSize:10.5, fontWeight:600, lineHeight:1.35 }}>
              <div>탭하여</div><div>{mode==='listening' ? '완료' : '말하기'}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function MicButton({ mode, onStart, onStop }) {
  const listening = mode==='listening';
  const busy = mode==='thinking';
  return (
    <button className="tap" disabled={busy} onClick={listening?onStop:onStart} style={{
      position:'relative', width:74, height:74, borderRadius:'50%', border:'none', cursor: busy?'default':'pointer',
      background: listening ? 'linear-gradient(135deg,#A84E2C,#8f3f22)' : 'linear-gradient(135deg,#C5613A,#A84E2C)',
      boxShadow:'0 10px 24px rgba(168,78,44,0.4)', display:'grid', placeItems:'center', color:'#fff', opacity: busy?.5:1 }}>
      {listening && [0,1].map(i=>(
        <span key={i} style={{ position:'absolute', inset:0, borderRadius:'50%', border:'2px solid var(--terra)',
          animation:`ring 1.8s ${i*0.9}s ease-out infinite` }} />
      ))}
      {listening
        ? <span style={{ width:22, height:22, borderRadius:6, background:'#fff' }} />
        : <window.IcMic size={30}/>}
    </button>
  );
}

function FinishCard({ onFinish }) {
  return (
    <div className="rise card" style={{ marginTop:22, padding:'22px 20px', textAlign:'center',
      background:'linear-gradient(160deg, #FBF7EF, #F4E7D8)' }}>
      <div style={{ width:46, height:46, borderRadius:15, margin:'0 auto 12px', display:'grid', placeItems:'center',
        background:'var(--terra-soft)', color:'var(--terra-d)' }}><window.IcBook size={24}/></div>
      <div className="serif" style={{ fontSize:18, fontWeight:600 }}>오늘 이야기, 잘 들었어요</div>
      <div className="muted" style={{ fontSize:13.5, lineHeight:1.6, marginTop:7, maxWidth:250, marginInline:'auto' }}>
        나눈 이야기를 일기로 정리하고, 인사이트와 감정, 내일 이어갈 일들을 뽑아둘게요.
      </div>
      <button className="btn btn-primary" onClick={onFinish} style={{ marginTop:18, width:'100%' }}>
        <window.IcSpark size={18}/> 오늘의 일기 정리하기
      </button>
    </div>
  );
}

Object.assign(window, { ConvoScreen });
  </script>

                  {added ? <>담김 ✓</> : <><window.IcPlus size={14}/>추가</>}
                </button>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ padding:'28px 20px 0' }}>
        <button className="btn btn-ghost" onClick={onBack} style={{ width:'100%' }}>홈으로 돌아가기</button>
      </div>
    </div>
  );
}
Object.assign(window, { DiaryScreen });
  </script>

  <!-- screen-monthly -->
  <script type="text/babel" data-presets="react">
/* screen-monthly — monthly review */
function MonthlyScreen() {
  const days = window.MONTH_DAYS;
  const dist = window.MONTH_EMO_DIST;
  const cats = window.MONTH_CATS;
  const total = dist.reduce((s,d)=>s+d.n,0);
  const maxN = Math.max(...dist.map(d=>d.n));
  const firstDow = 1;
  const recorded = days.filter(d=>d.mood).length;

  return (
    <div className="screen" style={{ paddingBottom:118 }}>
      <div style={{ padding:'70px 22px 6px' }}>
        <div className="sec-label">월별 회고</div>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginTop:8 }}>
          <window.IcChevL size={20} style={{ color:'var(--ink-3)' }} />
          <h1 className="serif" style={{ margin:0, fontSize:28, fontWeight:600 }}>2026 · 6월</h1>
          <window.IcChevR size={20} style={{ color:'var(--ink-3)' }} />
        </div>
        <div className="muted" style={{ fontSize:13.5, marginTop:6 }}>이번 달 <b style={{color:'var(--terra)'}}>{recorded}일</b> 기록했어요. 꾸준함이 쌓이고 있어요.</div>
      </div>

      <div style={{ padding:'16px 18px 0' }}>
        <div className="card" style={{ padding:'18px 18px 20px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:6, marginBottom:8 }}>
            {['월','화','수','목','금','토','일'].map(d=>(
              <div key={d} className="faint" style={{ textAlign:'center', fontSize:11, fontWeight:600 }}>{d}</div>
            ))}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:6 }}>
            {Array.from({length:firstDow}).map((_,i)=><div key={'p'+i} />)}
            {days.map(d=>{
              const e = d.mood ? window.EMO[d.mood] : null;
              const today = d.day===14;
              return (
                <div key={d.day} style={{ aspectRatio:'1', borderRadius:11, display:'grid', placeItems:'center', position:'relative',
                  background: e ? `color-mix(in srgb, ${e.color} 20%, var(--paper))` : 'var(--paper-2)',
                  border: today ? '2px solid var(--terra)' : '1px solid transparent' }}>
                  <span style={{ fontSize:12, fontWeight: today?700:600, color: e ? `color-mix(in srgb, ${e.color} 55%, var(--ink))` : 'var(--ink-3)' }}>{d.day}</span>
                  {e && <span style={{ position:'absolute', bottom:5, width:5, height:5, borderRadius:'50%', background:e.color }} />}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ padding:'22px 18px 0' }}>
        <window.SectionHead label="이번 달 감정 분포" />
        <div className="card" style={{ padding:'18px 19px' }}>
          <div style={{ display:'flex', flexDirection:'column', gap:13 }}>
            {dist.map(d=>{
              const e = window.EMO[d.key];
              return (
                <div key={d.key} style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <div style={{ width:42, fontSize:13, fontWeight:600, color:'var(--ink-2)' }}>{e.label}</div>
                  <div style={{ flex:1, height:10, borderRadius:6, background:'var(--paper-2)', overflow:'hidden' }}>
                    <div style={{ width:`${(d.n/maxN)*100}%`, height:'100%', borderRadius:6, background:e.color,
                      transition:'width .6s ease' }} />
                  </div>
                  <div className="faint" style={{ width:30, textAlign:'right', fontSize:12.5, fontWeight:600 }}>{d.n}일</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ padding:'24px 18px 0' }}>
        <window.SectionHead label="카테고리별 흐름" />
        <div style={{ display:'flex', flexDirection:'column', gap:11 }}>
          {cats.map((c,i)=>(
            <div key={i} className="card" style={{ padding:'17px 18px' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:9 }}>
                <div style={{ display:'flex', alignItems:'center', gap:9 }}>
                  <span style={{ width:10, height:10, borderRadius:3, background:c.color }} />
                  <span style={{ fontSize:15, fontWeight:700 }}>{c.name}</span>
                </div>
                <span className="faint" style={{ fontSize:12.5, fontWeight:600 }}>{c.n}개 기록</span>
              </div>
              <div style={{ fontSize:13.5, lineHeight:1.62, color:'var(--ink)', display:'flex', gap:8 }}>
                <window.IcSpark size={15} style={{ color:c.color, flexShrink:0, marginTop:2 }} />
                <span>{c.insight}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding:'24px 18px 0' }}>
        <window.SectionHead label="이번 달의 단어들" />
        <div className="card" style={{ padding:'18px 18px 20px' }}>
          <div style={{ display:'flex', flexWrap:'wrap', gap:9 }}>
            {window.MONTH_KEYWORDS.map((k,i)=>{
              const sizes=[22,16,19,15,18,15];
              return <span key={k} className="serif" style={{ fontSize:sizes[i%sizes.length], fontWeight:600,
                color:`color-mix(in srgb, var(--terra) ${30+ (i%3)*22}%, var(--ink))` }}>{k}</span>;
            })}
          </div>
        </div>
      </div>
    </div>
  );
}
Object.assign(window, { MonthlyScreen });
  </script>

  <!-- screen-todo -->
  <script type="text/babel" data-presets="react">
/* screen-todo — todo list (conversation-linked) */
function TodoScreen({ todos, setTodos }) {
  const [carry, setCarry] = useState(window.TODOS_CARRY);
  const [adding, setAdding] = useState('');

  const toggle = (id) => setTodos(ts => ts.map(t => t.id===id ? {...t, done:!t.done} : t));
  const toggleCarry = (id) => setCarry(cs => cs.map(t => t.id===id ? {...t, done:!t.done} : t));
  const add = () => {
    const text = adding.trim(); if (!text) return;
    setTodos(ts => [...ts, { id:'n'+Date.now(), text, done:false, cat:'기타' }]);
    setAdding('');
  };
  const pullCarry = (id) => {
    const item = carry.find(c=>c.id===id); if(!item) return;
    setCarry(cs => cs.filter(c=>c.id!==id));
    setTodos(ts => [...ts, { ...item, id:'p'+Date.now() }]);
  };

  const done = todos.filter(t=>t.done).length;
  const tot = todos.length;
  const pct = tot ? Math.round(done/tot*100) : 0;

  return (
    <div className="screen" style={{ paddingBottom:118 }}>
      <div style={{ padding:'70px 22px 6px' }}>
        <div className="sec-label">오늘의 할 일</div>
        <h1 className="serif" style={{ margin:'8px 0 0', fontSize:28, fontWeight:600 }}>6월 14일</h1>
      </div>

      <div style={{ padding:'16px 18px 0' }}>
        <div className="card" style={{ padding:'18px 20px', display:'flex', alignItems:'center', gap:18 }}>
          <ProgressRing pct={pct} />
          <div style={{ flex:1 }}>
            <div style={{ fontSize:16, fontWeight:700 }}>{done}개 완료 · {tot-done}개 남음</div>
            <div className="muted" style={{ fontSize:13.5, lineHeight:1.5, marginTop:4 }}>
              {pct===100 ? '오늘 할 일을 다 끝냈어요. 멋져요!' : '천천히 하나씩, 충분히 잘하고 있어요.'}
            </div>
          </div>
        </div>
      </div>

      <div style={{ padding:'16px 18px 0' }}>
        <div style={{ display:'flex', gap:9, alignItems:'center', background:'var(--paper)', borderRadius:18, boxShadow:'var(--shadow-card)', padding:'6px 6px 6px 16px' }}>
          <input value={adding} onChange={e=>setAdding(e.target.value)} placeholder="할 일 추가하기"
            onKeyDown={e=>{ if(e.key==='Enter') add(); }}
            style={{ flex:1, border:'none', outline:'none', background:'none', fontFamily:'var(--sans)', fontSize:15, padding:'10px 0', color:'var(--ink)' }} />
          <button className="tap" onClick={add} disabled={!adding.trim()} style={{ border:'none', width:40, height:40, borderRadius:'50%',
            background: adding.trim()?'var(--terra)':'var(--line)', color:'#fff', display:'grid', placeItems:'center', cursor:'pointer' }}>
            <window.IcPlus size={20}/>
          </button>
        </div>
      </div>

      <div style={{ padding:'22px 18px 0' }}>
        <window.SectionHead label="할 일" />
        <div className="card" style={{ overflow:'hidden' }}>
          {todos.map((t,i)=>(
            <TodoRow key={t.id} t={t} last={i===todos.length-1} onToggle={()=>toggle(t.id)} />
          ))}
        </div>
      </div>

      {carry.length>0 && (
        <div style={{ padding:'22px 18px 0' }}>
          <window.SectionHead label="어제 못다 한 일" />
          <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
            {carry.map(t=>(
              <div key={t.id} className="card" style={{ padding:'13px 15px', display:'flex', alignItems:'center', gap:12 }}>
                <window.IcMoon size={17} style={{ color:'var(--emo-low)', flexShrink:0 }} />
                <span style={{ flex:1, fontSize:14.5 }}>{t.text}</span>
                <button className="tap" onClick={()=>pullCarry(t.id)} style={{ border:'none', cursor:'pointer',
                  background:'var(--paper-2)', color:'var(--terra)', borderRadius:999, padding:'7px 13px', fontSize:12.5, fontWeight:700,
                  display:'flex', alignItems:'center', gap:4 }}>
                  <window.IcArrowU size={14}/> 오늘로
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ padding:'22px 22px 0' }}>
        <div className="faint" style={{ fontSize:12.5, lineHeight:1.6, textAlign:'center' }}>
          <window.IcSpark size={13} style={{ verticalAlign:'-2px', marginRight:4 }} />
          할 일은 코치가 당신의 하루 맥락을 이해하는 데 쓰여요.
        </div>
      </div>
    </div>
  );
}

function TodoRow({ t, last, onToggle }) {
  return (
    <div className="tap" onClick={onToggle} style={{ display:'flex', alignItems:'center', gap:13, padding:'14px 16px',
      borderBottom: last?'none':'1px solid var(--line-2)', cursor:'pointer' }}>
      <span style={{ width:22, height:22, borderRadius:7, flexShrink:0, display:'grid', placeItems:'center',
        border: t.done?'none':'1.8px solid var(--line)', background: t.done?'var(--sage)':'transparent', transition:'all .15s' }}>
        {t.done && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12.5 9.5 18 20 6.5"/></svg>}
      </span>
      <span style={{ flex:1, fontSize:15, lineHeight:1.4, color: t.done?'var(--ink-3)':'var(--ink)',
        textDecoration: t.done?'line-through':'none', textDecorationColor:'var(--ink-3)' }}>{t.text}</span>
      {t.from==='대화' && <span className="pill" style={{ background:'var(--gold-soft)', color:'#9A7420', fontSize:10.5, padding:'3px 9px', gap:3 }}>
        <window.IcMic size={11}/> 대화</span>}
      <span className="faint" style={{ fontSize:11.5, fontWeight:600 }}>{t.cat}</span>
    </div>
  );
}

function ProgressRing({ pct }) {
  const r=26, c=2*Math.PI*r, off=c*(1-pct/100);
  return (
    <div style={{ position:'relative', width:64, height:64, flexShrink:0 }}>
      <svg width="64" height="64" style={{ transform:'rotate(-90deg)' }}>
        <circle cx="32" cy="32" r={r} fill="none" stroke="var(--paper-2)" strokeWidth="7" />
        <circle cx="32" cy="32" r={r} fill="none" stroke="var(--terra)" strokeWidth="7" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={off} style={{ transition:'stroke-dashoffset .5s ease' }} />
      </svg>
      <div style={{ position:'absolute', inset:0, display:'grid', placeItems:'center', fontSize:15, fontWeight:700, color:'var(--terra)' }}>{pct}%</div>
    </div>
  );
}

Object.assign(window, { TodoScreen, ProgressRing });
  </script>

  <!-- app shell -->
  <script type="text/babel" data-presets="react">
/* app — shell, tab navigation, state */
function TabBar({ tab, setTab, onRecord }) {
  const items = [
    { key:'home',    label:'홈',   Icon: window.IcHome },
    { key:'todo',    label:'할 일', Icon: window.IcCheck },
    { key:'__fab',   label:'',     Icon: null },
    { key:'monthly', label:'회고', Icon: window.IcCal },
    { key:'diary',   label:'일기', Icon: window.IcBook },
  ];
  return (
    <div style={{ position:'absolute', left:0, right:0, bottom:0, zIndex:40, paddingBottom:14, paddingInline:14,
      pointerEvents:'none' }}>
      <div style={{ position:'relative', pointerEvents:'auto', display:'flex', alignItems:'center',
        background:'rgba(251,247,239,0.86)', backdropFilter:'blur(18px) saturate(160%)', WebkitBackdropFilter:'blur(18px) saturate(160%)',
        borderRadius:30, boxShadow:'0 6px 24px rgba(51,48,43,0.14), 0 0 0 1px rgba(51,48,43,0.04)', padding:'9px 8px 8px' }}>
        {items.map(it => {
          if (it.key==='__fab') return <div key="fab" style={{ width:70 }} />;
          const on = tab===it.key;
          return (
            <button key={it.key} className="tap" onClick={()=>setTab(it.key)} style={{ flex:1, border:'none', background:'none',
              display:'flex', flexDirection:'column', alignItems:'center', gap:3, cursor:'pointer', padding:'4px 0',
              color: on?'var(--terra)':'var(--ink-3)' }}>
              <it.Icon size={23} sw={on?2.1:1.8} />
              <span style={{ fontSize:10.5, fontWeight: on?700:600 }}>{it.label}</span>
            </button>
          );
        })}
        <button className="tap" onClick={onRecord} style={{ position:'absolute', left:'50%', top:-20, transform:'translateX(-50%)',
          width:62, height:62, borderRadius:'50%', border:'4px solid var(--bg)', cursor:'pointer',
          background:'linear-gradient(135deg,#C5613A,#A84E2C)', color:'#fff', display:'grid', placeItems:'center',
          boxShadow:'0 8px 20px rgba(168,78,44,0.42)' }}>
          <window.IcMic size={26}/>
        </button>
      </div>
    </div>
  );
}

function DiaryEmpty({ onRecord }) {
  return (
    <div className="screen" style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center', padding:'0 40px 80px' }}>
      <div style={{ width:74, height:74, borderRadius:24, display:'grid', placeItems:'center', background:'var(--paper)', boxShadow:'var(--shadow-card)', color:'var(--terra)', marginBottom:20 }}>
        <window.IcBook size={36}/>
      </div>
      <div className="serif" style={{ fontSize:20, fontWeight:600 }}>아직 오늘 일기가 없어요</div>
      <div className="muted" style={{ fontSize:14, lineHeight:1.6, marginTop:8 }}>코치와 잠깐 이야기하면<br/>일기와 인사이트로 정리해드려요.</div>
      <button className="btn btn-primary" onClick={onRecord} style={{ marginTop:22 }}>
        <window.IcMic size={18}/> 오늘 기록 시작하기
      </button>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('home');
  const [overlay, setOverlay] = useState(null);
  const [todayDone, setTodayDone] = useState(false);
  const [todos, setTodos] = useState(window.TODOS_TODAY);
  const [addedTodos, setAddedTodos] = useState([]);

  const record = () => setOverlay('convo');
  const finishConvo = () => {
    setTodayDone(true);
    setOverlay('diary');
  };
  const addTodoFromDiary = (text) => {
    setAddedTodos(a => [...a, text]);
    setTodos(ts => [...ts, { id:'d'+Date.now(), text, done:false, cat: text.includes('걷')||text.includes('운동')?'건강':'업무', from:'대화' }]);
  };

  let screen;
  if (tab==='home') screen = <window.HomeScreen todayDone={todayDone} todos={todos}
    onRecord={record} onOpenDiary={()=>setOverlay('diary')} onGoTodo={()=>setTab('todo')} onGoMonthly={()=>setTab('monthly')} />;
  else if (tab==='todo') screen = <window.TodoScreen todos={todos} setTodos={setTodos} />;
  else if (tab==='monthly') screen = <window.MonthlyScreen />;
  else if (tab==='diary') screen = todayDone
    ? <window.DiaryScreen onBack={()=>setTab('home')} onAddTodos={addTodoFromDiary} addedTodos={addedTodos} />
    : <DiaryEmpty onRecord={record} />;

  return (
    <div className="app-root" style={{ position:'relative', height:'100%' }}>
      {screen}
      <TabBar tab={tab} setTab={setTab} onRecord={record} />

      {overlay==='convo' && <window.ConvoScreen onClose={()=>setOverlay(null)} onFinish={finishConvo} />}
      {overlay==='diary' && (
        <div style={{ position:'absolute', inset:0, zIndex:70, background:'var(--bg)' }}>
          <window.DiaryScreen onBack={()=>{ setOverlay(null); setTab('home'); }} onAddTodos={addTodoFromDiary} addedTodos={addedTodos} />
        </div>
      )}
    </div>
  );
}

Object.assign(window, { App, TabBar });
  </script>

  <!-- root render -->
  <script type="text/babel" data-presets="react">
const W = 402, H = 874;
function Root() {
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const fit = () => {
      const m = 24;
      const s = Math.min((window.innerWidth - m*2) / W, (window.innerHeight - m*2) / H, 1);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);
  return (
    <div style={{ transform:`scale(${scale})`, transformOrigin:'center center' }}>
      <window.IOSDevice width={W} height={H}>
        <div className="device-screen">
          <window.App />
        </div>
      </window.IOSDevice>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('stage')).render(<Root />);
  </script>
</body>
