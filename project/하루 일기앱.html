<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>하루 — AI 코칭 일기앱</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(120% 90% at 50% 0%, #EBE3D3 0%, #E3D9C6 60%, #DACEB8 100%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; box-sizing: border-box;
    font-family: "Pretendard Variable", Pretendard, system-ui, sans-serif;
  }
  #stage { display: flex; align-items: center; justify-content: center; }
  /* the inner content area of the device must clip + fill */
  .device-screen { position: absolute; inset: 0; }
</style>
</head>
<body>
  <div id="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="screen-home.jsx"></script>
  <script type="text/babel" src="screen-convo.jsx"></script>
  <script type="text/babel" src="screen-diary.jsx"></script>
  <script type="text/babel" src="screen-monthly.jsx"></script>
  <script type="text/babel" src="screen-todo.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    const W = 402, H = 874;
    function Root() {
      const [scale, setScale] = React.useState(1);
      React.useEffect(() => {
        const fit = () => {
          const m = 24;
          const s = Math.min((window.innerWidth - m*2) / W, (window.innerHeight - m*2) / H, 1);
          setScale(s);
        };
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);
      return (
        <div style={{ transform:`scale(${scale})`, transformOrigin:'center center' }}>
          <window.IOSDevice width={W} height={H}>
            <div className="device-screen">
              <window.App />
            </div>
          </window.IOSDevice>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('stage')).render(<Root />);
  </script>
</body>
</html>
